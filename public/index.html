<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AccountPro - Professional Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #020617; 
            --card-bg: rgba(15, 23, 42, 0.9); 
            --accent: #fbbf24; 
            --border: #1e293b; 
            --danger: #ef4444; 
            --success: #10b981;
            --pro-red: #dc2626;
            --pro-black: #000000;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(rgba(2, 6, 23, 0.8), rgba(2, 6, 23, 0.8)), 
                        url('https://images.unsplash.com/photo-1551288049-bbbda5366392?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #f8fafc; 
            margin: 0; 
            padding: 0; 
            user-select: none; 
        }
        
        nav { 
            background: var(--pro-black); 
            padding: 15px 40px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid var(--pro-red);
            position: sticky; top: 0; z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .logo { font-family: 'Orbitron', sans-serif; font-size: 1.6rem; font-weight: 800; letter-spacing: 2px; }
        .logo span { color: var(--pro-red); }
        .logo b { color: #fff; }

        .nav-links { display: flex; gap: 15px; align-items: center; }

        .btn-gd {
            padding: 10px 18px;
            border-radius: 5px;
            font-weight: 700;
            font-size: 0.75rem;
            text-decoration: none;
            text-transform: uppercase;
            transition: 0.3s;
            border: 1px solid transparent;
            cursor: pointer;
        }
        .btn-import { background: var(--pro-red); color: white; }
        .btn-export { background: #fff; color: var(--pro-black); }

        .btn-new { 
            background: var(--accent); color: #020617; 
            padding: 10px 20px; border-radius: 8px; 
            font-weight: 800; border: none; cursor: pointer; 
            text-transform: uppercase; transition: 0.3s;
            font-size: 0.75rem;
        }

        .main-content { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        
        .section-header { margin-bottom: 30px; border-left: 4px solid var(--pro-red); padding-left: 15px; }
        .section-header h2 { font-size: 1.2rem; text-transform: uppercase; letter-spacing: 1.5px; color: #fff; margin: 0; }

        .ledger-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        
        .folder-card {
            background: rgba(251, 191, 36, 0.1);
            border: 2px dashed var(--accent);
            border-radius: 16px;
            padding: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
            cursor: pointer;
            transition: 0.3s;
        }
        .folder-card:hover { background: rgba(251, 191, 36, 0.2); transform: scale(1.02); }
        .folder-icon { font-size: 3rem; }

        .ledger-card { 
            background: var(--card-bg); 
            border: 1px solid var(--border); 
            border-radius: 16px; 
            padding: 25px; 
            transition: 0.3s;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }
        .ledger-card:hover { border-color: var(--pro-red); transform: translateY(-5px); }
        /* Delete Button ka look aur position */
/* 1. Card ko 'Parent' banao */
.ledger-card { 
    position: relative; 
    /* baaki aapka purana code yahan rahega */
}

/* 2. Button ko 'Absolute' karo */
.btn-delete {
    position: absolute; /* Relative ko mita kar Absolute kar do */
    top: 15px;
    right: 15px;
    background: rgba(239, 68, 68, 0.1);
    color: #ef4444;
    border: 1px solid rgba(239, 68, 68, 0.2);
    width: 30px;
    height: 30px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: 0.2s;
    z-index: 10;
    float: right; /* Ye line nikal dena agar pehle se hai */
}
        
        .cat-tag { background: var(--pro-red); color: #fff; font-size: 0.6rem; padding: 4px 10px; border-radius: 4px; font-weight: 800; text-transform: uppercase; margin-bottom: 10px; display: inline-block; }
        .company-label { font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; font-weight: 700; margin-bottom: 2px; }
        .ledger-card h3 { margin: 0; color: #fff; font-family: 'Orbitron'; font-size: 1.3rem; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(10px); }
        .modal-content { background: #0f172a; padding: 35px; border-radius: 24px; width: 100%; max-width: 450px; border: 1px solid var(--pro-red); }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.8rem; color: #94a3b8; font-weight: 600; }
        input, select { width: 100%; padding: 12px; background: #020617; border: 1px solid var(--border); border-radius: 10px; color: white; outline: none; box-sizing: border-box; }
    </style>
</head>
<body oncontextmenu="return false;">
    <script src="security.js"></script>

<nav>
    <div class="logo"><span>ACCOUNT</span><b>PRO</b></div>
    <div class="nav-links">
        <button onclick="alert('First click on + CREATE PARTY GD to register a new party.')" class="btn-gd btn-import">Import GD Data</button>
        <button onclick="alert('First click on + CREATE PARTY GD to register a new party.')" class="btn-gd btn-export">Export GD Data</button>
        
        <button class="btn-new" style="background: #f59e0b; color: white;" onclick="window.location.href='crreategd.html'">+ CREATE PARTY GD</button>
        <span style="color: var(--pro-red); font-weight: 900; margin: 0 10px;">|</span>
        <button class="btn-new" onclick="document.getElementById('createModal').style.display='flex'">+ NEW LEDGER</button>
    </div>
</nav>

<div class="main-content">
    <div class="section-header">
        <h2>System Directory</h2>
    </div>
    <div class="ledger-grid" style="margin-bottom: 40px;">
        <div class="folder-card" onclick="window.location.href='gd_archive.html'">
            <div class="folder-icon">📂</div>
            <div>
                <h3 style="margin:0; font-family:'Orbitron'; color:var(--accent);">GD PARTY ARCHIVE</h3>
                <p style="margin:5px 0 0; font-size:0.7rem; color:#94a3b8; font-weight:700;">0 ACTIVE PARTY FILES</p>
            </div>
        </div>
    </div>

    <div class="section-header">
        <h2>Active Business Ledgers</h2>
    </div>
    <div id="ledgerList" class="ledger-grid"></div>
</div>

<div id="createModal" class="modal">
    <div class="modal-content">
        <h2 style="color: var(--pro-red); font-family: 'Orbitron'; margin-bottom: 25px;">Setup New System</h2>
        <div class="input-group">
            <label>Business / Company Name</label>
            <input type="text" id="lCompany" placeholder="e.g. AL-HAMZA TRADERS">
        </div>
        <div class="input-group">
            <label>Account Holder Name</label>
            <input type="text" id="lName" placeholder="e.g. AMEER HAMZA">
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="input-group">
                <label>Category</label>
                <select id="lCat">
                    <option>Business</option>
                    <option>Personal</option>
                    <option>Import GD</option>
                    <option>Export GD</option>
                </select>
            </div>
            <div class="input-group">
                <label>Opening PKR</label>
                <input type="number" id="lBal" value="0">
            </div>
        </div>
        <button class="btn-new" style="width:100%; margin-top: 10px;" id="generate-btn">GENERATE SYSTEM</button>
        <button style="width:100%; background:none; border:none; color:#64748b; margin-top:15px; cursor:pointer;" onclick="document.getElementById('createModal').style.display='none'">CANCEL</button>
    </div>
</div>

<script>
    const storageKey = 'my_local_ledgers';

// Naya Database wala Save Function
document.getElementById('generate-btn').onclick = async function() {
    // 1. Form se data uthana (IDs check kar len ke HTML mein yehi hain)
    const entryData = {
        date: new Date().toISOString().split('T')[0], // Aaj ki date
        importer_name: document.getElementById('lName').value.trim().toUpperCase(),
        id_index: document.getElementById('lCompany').value.trim().toUpperCase(),
        cargo_details: "General Cargo", // Agar alag field hai to uska ID likhen
        total_bill: parseFloat(document.getElementById('lBal').value) || 0,
        paid: 0, 
        mode: "Pending",
        payable: parseFloat(document.getElementById('lBal').value) || 0
    };

    // Validation: Agar naam ya company khali hai to ruk jao
    if(!entryData.importer_name || !entryData.id_index) {
        return alert("Error: Required fields missing!");
    }

    try {
        // 2. Backend Server ko data bhejna
        const response = await fetch('http://localhost:3000/add-entry', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(entryData)
        });

        if (response.ok) {
            const result = await response.text();
            alert(result); // "Data kamyabi se save ho gaya!"
            
            // Modal band karna aur dashboard refresh karna
            document.getElementById('createModal').style.display = 'none';
            // loadDashboard(); // Agar aapne table show karne ka function banaya hai
        } else {
            alert("Server error: Data save nahi ho saka.");
        }
    } catch (error) {
        console.error('Error:', error);
        alert('Server se connect nahi ho saka! Check karen CMD mein server chal raha hai?');
    }
};
async function deleteLedger(id, event) {
    event.stopPropagation();
    if (!confirm("Kya aap waqai is ledger ko khatam karna chahte hain?")) return;

    try {
        const response = await fetch(`http://localhost:3000/delete-entry/${id}`, {
            method: 'DELETE'
        });

        if (response.ok) {
            alert("Ledger delete ho gaya!");
            loadDashboard(); // Screen refresh karo
        } else {
            alert("Delete nahi ho saka.");
        }
    } catch (error) {
        console.error('Error:', error);
    }
}async function loadDashboard() {
    const container = document.getElementById('ledgerList');
    const archiveText = document.querySelector('.folder-card p');

    try {
        // 1. DigitalOcean Database se data mangwana
        const response = await fetch('http://localhost:3000/get-entries');
        const systems = await response.json();

        // 2. Folder count update karna (GD Files ke liye)
        let gdFiles = systems.filter(s => s.id_index.includes('GD'));
        if(archiveText) {
            archiveText.innerText = `${gdFiles.length} ACTIVE PARTY FILES`;
        }

        // 3. Container khali karna
        container.innerHTML = '';

        if (systems.length === 0) {
            container.innerHTML = `
                <div style="grid-column:1/-1; text-align:center; padding:60px 20px; color:#64748b; border:2px dashed #1e293b; border-radius:24px;">
                    <div style="font-size: 2rem; margin-bottom: 10px;">🗄️</div>
                    <p style="font-weight: 700; text-transform: uppercase; letter-spacing: 1px;">No business ledgers found.</p>
                    <p style="font-size: 0.7rem; color: #475569;">Click '+ NEW LEDGER' to get started.</p>
                </div>`;
            return;
        }

        // 4. Database se aaye huye data ke cards banana
        // Hum .reverse() use kar rahe hain taake latest entry pehle nazar aaye
        systems.reverse().forEach(s => {
            const card = `
                <div class="ledger-card" onclick="window.location.href='datastatement.html?ledger=${encodeURIComponent(s.importer_name)}'">
                    <div class="btn-delete" onclick="event.stopPropagation(); deleteLedger(${s.id}, event)">🗑️</div>
                    <span class="cat-tag">BUSINESS</span>
                    <div class="company-label">${s.id_index} || Private Account</div>
                    <h3>${s.importer_name}</h3>
                    <div style="margin-top:20px; border-top:1px solid var(--border); padding-top:12px; display:flex; justify-content:space-between; align-items: flex-end;">
                        <div>
                            <div style="font-size:0.55rem; color:#94a3b8; font-weight: 800; letter-spacing: 0.5px;">OPENING BALANCE</div>
                            <div style="color:var(--success); font-weight:900; font-family: 'Orbitron'; font-size: 0.9rem;">
                                PKR ${parseFloat(s.total_bill).toLocaleString()}
                            </div>
                        </div>
                        <div style="color: var(--pro-red); font-size: 0.8rem;"><i class="fa-solid fa-arrow-right"></i></div>
                    </div>
                </div>`;
            container.innerHTML += card;
        });

    } catch (error) {
        console.error('Error loading dashboard:', error);
    }
}

    window.onload = loadDashboard;
</script>
</body>
</html>
