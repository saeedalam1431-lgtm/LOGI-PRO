<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiPro | Export Account Management</title>
    <script src="security.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        body { 
            background-color: #f8fafc; 
            font-family: 'Inter', sans-serif; 
            -webkit-user-select: none; 
            user-select: none; 
            overflow-x: hidden; 
        }
        .table-container { background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); border: 1px solid #e2e8f0; width: 100%; overflow: hidden; }
        .logi-header { background: #0f172a; }
        .overflow-x-auto::-webkit-scrollbar { height: 5px; }
        .overflow-x-auto::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        #editModal { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); transition: all 0.3s ease; }
        #ledgerPartyName { font-size: 26px; font-weight: 900; color: #0f172a; text-transform: uppercase; letter-spacing: -0.5px; line-height: 1; }
        input:focus, select:focus { 
            border-color: #dc2626 !important; 
            outline: none;
            box-shadow: 0 0 0 2px #fee2e2; 
        }
        #tableBody tr td { 
            padding: 8px 12px !important; 
        }
        .shipment-cell-fix {
            max-width: 180px; 
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            transition: all 0.2s ease;
        }
        .shipment-cell-fix:hover {
            white-space: normal; 
            background: #f8fafc;
        }
    </style>
</head>
<body oncontextmenu="return false;" onkeydown="return disableShortcuts(event);">

    <div class="w-full max-w-[98%] mx-auto p-4 md:p-6">
        <header class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4 border-b border-slate-200 pb-6">
            <div class="flex items-center gap-6">
                <div class="flex items-center gap-4">
                    <div class="bg-red-600 p-4 rounded-2xl text-white shadow-lg shadow-red-200">
                        <i class="fas fa-file-invoice-dollar fa-2xl"></i>
                    </div>
                    <div>
                        <div class="flex items-center gap-2 mb-1">
                            <h1 class="text-lg font-black text-slate-900 tracking-tighter italic leading-none">Logi<span class="text-red-600">Pro</span></h1>
                            <span class="h-1 w-8 bg-red-600 rounded-full"></span>
                        </div>
                        <h2 id="ledgerPartyName" class="italic">LOADING...</h2>
                    </div>
                </div>
            </div>
            
            <div class="flex items-center gap-2">
                <a href="index.html" class="flex flex-col items-center justify-center bg-white border-2 border-slate-200 text-slate-600 w-14 h-14 rounded-2xl hover:bg-slate-900 hover:text-white transition-all shadow-sm group">
                    <i class="fas fa-th-large text-lg"></i>
                    <span class="text-[8px] font-bold mt-1 uppercase">Home</span>
                </a>
                <button onclick="downloadSecurePDF()" class="bg-slate-900 text-white font-bold px-4 py-3 rounded-xl hover:bg-slate-800 transition-all flex items-center gap-2 text-[11px]">
                    <i class="fas fa-shield-alt text-red-500"></i> GENERATE SECURE PDF
                </button>
                <button onclick="goToEntry()" class="bg-red-600 text-white font-black px-5 py-3 rounded-xl hover:bg-red-700 transition-all shadow-lg text-[11px] italic">+ NEW ENTRY</button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 border-l-4 border-l-red-600">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Party Balance</p>
                <h3 id="stat-party-bal" class="text-xl font-black text-slate-800 mt-1 italic tracking-tight">PKR 0</h3>
            </div>
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 border-l-4 border-l-blue-600">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Total Jobs</p>
                <h3 id="stat-party-jobs" class="text-xl font-black text-slate-800 mt-1 italic tracking-tight">0</h3>
            </div>
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 border-l-4 border-l-emerald-600">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Total Received</p>
                <h3 id="stat-total-paid" class="text-xl font-black text-slate-800 mt-1 italic tracking-tight">PKR 0</h3>
            </div>
        </div>

        <div class="relative mb-6 w-full max-w-md">
            <span class="absolute inset-y-0 left-4 flex items-center text-slate-400"><i class="fas fa-search text-xs"></i></span>
            <input type="text" id="searchInput" onkeyup="searchTable()" placeholder="Search Exporter, GD or Container..." class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 outline-none text-xs font-semibold shadow-sm">
        </div>

        <div class="table-container">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse min-w-[1100px]" id="ledgerTable">
                    <thead>
                        <tr class="logi-header text-white uppercase text-[10px] tracking-wider font-bold">
                            <th class="p-5">Date</th>
                            <th class="p-5">Exporter Name</th>
                            <th class="p-5">GD Number</th>
                            <th class="p-5">Shipment Info</th>
                            <th class="p-5">Total Bill</th>
                            <th class="p-5">Received</th>
                            <th class="p-5">Payment Mode</th> 
                            <th class="p-5">Balance</th>
                            <th class="p-5 text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="text-slate-600 text-[13px] font-semibold"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="editModal" class="fixed inset-0 hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white w-full max-w-lg rounded-3xl shadow-2xl overflow-hidden border border-slate-200">
            <div class="bg-slate-900 p-6 text-white flex justify-between items-center">
                <h3 class="font-black italic text-lg tracking-tight">EDIT <span class="text-red-500">RECORD</span></h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-white text-2xl transition-colors">&times;</button>
            </div>
            <form id="editForm" class="p-6 grid grid-cols-2 gap-4">
                <input type="hidden" id="editIndex">
                <div class="col-span-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block tracking-widest">Exporter Name</label>
                    <input type="text" id="editParty" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2.5 text-xs font-bold outline-none uppercase">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block tracking-widest">GD Number</label>
                    <input type="text" id="editGd" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2.5 text-xs font-bold outline-none uppercase">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block tracking-widest">Date</label>
                    <input type="date" id="editDate" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2.5 text-xs font-bold outline-none uppercase">
                </div>
                <div class="border-t border-slate-100 col-span-2 my-1"></div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block italic">BL Number</label>
                    <input type="text" id="editBl" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2.5 text-xs font-bold outline-none uppercase">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block italic">Shipping Line</label>
                    <input type="text" id="editLine" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2.5 text-xs font-bold outline-none uppercase">
                </div>
                <div class="col-span-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block italic">Container Number</label>
                    <input type="text" id="editCont" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2.5 text-xs font-bold outline-none uppercase">
                </div>
                <div class="border-t border-slate-100 col-span-2 my-1"></div>
                <div>
                    <label class="text-[10px] font-bold text-blue-600 uppercase mb-1 block">Bill (PKR)</label>
                    <input type="number" id="editBill" class="w-full bg-blue-50/50 border border-blue-100 rounded-lg p-2.5 text-xs font-bold outline-none">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-emerald-600 uppercase mb-1 block">Received</label>
                    <input type="number" id="editPaid" class="w-full bg-emerald-50/50 border border-emerald-100 rounded-lg p-2.5 text-xs font-bold outline-none">
                </div>
                <div class="col-span-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block tracking-widest">Payment Method</label>
                    <select id="editMethod" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2.5 text-xs font-bold outline-none">
                        <option value="CASH">CASH</option>
                        <option value="BANK">BANK</option>
                        <option value="CHEQUE">CHEQUE</option>
                    </select>
                </div>
                <div class="col-span-2 mt-4 flex gap-2">
                    <button type="button" onclick="saveEdit()" class="flex-1 bg-slate-900 text-white font-black py-4 rounded-xl hover:bg-black shadow-lg text-xs italic tracking-widest transition-all">UPDATE RECORD</button>
                    <button type="button" onclick="closeModal()" class="flex-1 bg-slate-100 text-slate-600 font-bold py-4 rounded-xl hover:bg-slate-200 text-xs transition-all">CANCEL</button>
                </div>
            </form>
        </div>
    </div>

<script src="api.js"></script> 
<script>
    let allRecords = [];
    let filteredRecords = [];

    // --- 1. DATA SYNC (FETCH & FILTER) ---
    async function syncData() {
        const currentParty = localStorage.getItem('current_party_name');
        const nameElem = document.getElementById('ledgerPartyName');
        
        if (!currentParty) {
            alert("Pehle Dashboard se Party select karein!");
            window.location.href = "index.html";
            return;
        }

        if (nameElem) nameElem.innerText = currentParty.toUpperCase();

        try {
            // Backend se Export ka saara data mangwana
            const records = await Database.fetchAll('api/export/all');
            allRecords = records || [];

            // Sirf current party ka data filter karna (Trim aur Case sensitivity fix)
            filteredRecords = allRecords.filter(r => 
                r.party && r.party.toString().toUpperCase().trim() === currentParty.toUpperCase().trim()
            );

            updateStats();
            render();

        } catch (error) {
            console.error("Data load error:", error);
            const tbody = document.getElementById('tableBody');
            if(tbody) tbody.innerHTML = `<tr><td colspan="9" style="color:red; padding:20px; font-weight:bold; text-align:center;">❌ Server connect nahi ho raha! (Check Terminal)</td></tr>`;
        }
    }

    window.addEventListener('load', syncData);

    // --- 2. STATS CALCULATION ---
    function updateStats() {
        const bill = filteredRecords.reduce((s, r) => s + (parseFloat(r.total_bill) || 0), 0);
        const paid = filteredRecords.reduce((s, r) => s + (parseFloat(r.paid) || 0), 0);
        
        if(document.getElementById('stat-party-bal')) 
            document.getElementById('stat-party-bal').innerText = "PKR " + (bill - paid).toLocaleString();
        
        if(document.getElementById('stat-party-jobs')) 
            document.getElementById('stat-party-jobs').innerText = filteredRecords.length;
        
        if(document.getElementById('stat-total-paid')) 
            document.getElementById('stat-total-paid').innerText = "PKR " + paid.toLocaleString();
    }

    // --- 3. TABLE RENDERING ---
    function render() {
        const tbody = document.getElementById('tableBody');
        if (!tbody) return;

        if (filteredRecords.length === 0) {
            tbody.innerHTML = `<tr><td colspan="9" class="p-20 text-center text-slate-400 font-bold italic uppercase tracking-widest">No records found for ${localStorage.getItem('current_party_name')}</td></tr>`;
            return;
        }

        // slice().reverse() taake nayi entry upar aaye
        tbody.innerHTML = filteredRecords.slice().reverse().map((r) => {
            const bill = parseFloat(r.total_bill) || 0;
            const paid = parseFloat(r.paid) || 0;
            const bal = bill - paid;
            
            // Date format sahi karna
            const cleanDate = r.date ? new Date(r.date).toLocaleDateString('en-GB') : '---';
            
            return `
            <tr class="border-b border-slate-50 hover:bg-slate-50/80 transition-all group">
                <td class="p-5 text-[11px] text-slate-400 font-bold">${cleanDate}</td>
                <td class="p-5 font-black text-slate-800 uppercase tracking-tight">${r.party || '---'}</td>
                <td class="p-5"><span class="bg-red-50 text-red-600 px-2 py-1 rounded text-[10px] font-black border border-red-100 uppercase">${r.gd_number || '---'}</span></td>
                <td class="p-5">
                    <div class="shipment-cell-fix text-[10px] leading-tight">
                        <span class="text-blue-600 font-black block italic">BL: ${r.bl_number || '-'}</span>
                        <span class="text-slate-400 block italic">LINE: ${r.shipping_line || '-'}</span>
                        <span class="text-slate-900 font-bold block uppercase mt-1">CONT: ${r.container_number || '-'}</span>
                    </div>
                </td>
                <td class="p-5 font-bold text-slate-800">${bill.toLocaleString()}</td>
                <td class="p-5 font-black ${paid < bill ? "text-red-600" : "text-emerald-600"}">${paid.toLocaleString()}</td>
                <td class="p-5 font-bold text-blue-600 italic text-[11px] uppercase">${r.method || 'CASH'}</td> 
                <td class="p-5 font-black text-red-600">${bal.toLocaleString()}</td>
                <td class="p-5 text-center">
                    <div class="flex items-center justify-center gap-3 opacity-20 group-hover:opacity-100 transition-opacity">
                        <button onclick="openEditModal(${r.id})" class="text-slate-400 hover:text-blue-600 p-2"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteRow(${r.id})" class="text-slate-400 hover:text-red-600 p-2"><i class="fas fa-trash"></i></button>         
                    </div>
                </td>
            </tr>`;
        }).join('');
    }

    // --- 4. EDIT & DELETE FUNCTIONS ---
    function openEditModal(id) {
        const record = allRecords.find(item => item.id == id);
        if(!record) return;

        document.getElementById('editIndex').value = record.id;
        document.getElementById('editParty').value = record.party || "";
        document.getElementById('editGd').value = record.gd_number || "";
        document.getElementById('editDate').value = record.date ? record.date.split('T')[0] : "";
        document.getElementById('editBl').value = record.bl_number || "";
        document.getElementById('editLine').value = record.shipping_line || "";
        document.getElementById('editCont').value = record.container_number || "";
        document.getElementById('editBill').value = record.total_bill || 0;
        document.getElementById('editPaid').value = record.paid || 0;
        
        const methodField = document.getElementById('editMethod');
        if(methodField) methodField.value = record.method || "CASH";
        
        document.getElementById('editModal').classList.remove('hidden');
    }

    function closeModal() { 
        document.getElementById('editModal').classList.add('hidden'); 
    }

    async function saveEdit() {
        const id = document.getElementById('editIndex').value;
        const updatedData = {
            party: document.getElementById('editParty').value.toUpperCase(),
            gd_number: document.getElementById('editGd').value.toUpperCase(),
            date: document.getElementById('editDate').value,
            bl_number: document.getElementById('editBl').value.toUpperCase(),
            shipping_line: document.getElementById('editLine').value.toUpperCase(),
            container_number: document.getElementById('editCont').value.toUpperCase(),
            total_bill: parseFloat(document.getElementById('editBill').value) || 0,
            paid: parseFloat(document.getElementById('editPaid').value) || 0,
            method: document.getElementById('editMethod') ? document.getElementById('editMethod').value : "CASH"
        };

        try {
            const result = await Database.update('api/export/update', id, updatedData);
            if (result.success) { 
                alert("LogiPro: Record Updated!"); 
                closeModal(); 
                syncData(); 
            }
        } catch (e) { alert("Update failed: " + e.message); }
    }

    async function deleteRow(id) {
        if (!confirm("Are you sure? Ye record hamesha k liye delete ho jayega.")) return;
        try {
            const result = await Database.delete('api/export/delete', id);
            if (result.success) { 
                alert("Deleted Successfully!"); 
                syncData(); 
            }
        } catch (e) { alert("Delete failed!"); }
    }

    function searchTable() {
        const input = document.getElementById("searchInput").value.toUpperCase();
        const rows = document.querySelectorAll("#tableBody tr");
        rows.forEach(row => {
            row.style.display = row.innerText.toUpperCase().includes(input) ? "" : "none";
        });
    }

    function goToEntry() { window.location.href = "huk.html"; }
</script>
