<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AccountPro - Master Ledger</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Orbitron:wght@700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary: #020617;
            --pro-red: #ef4444;
            --accent-cyan: #22d3ee;
            --pro-black: #000000;
            --success: #10b981;
            --danger: #f43f5e;
            --surface: #ffffff;
        }

        /* --- COPY PROTECTION --- */
        body { 
            user-select: none; /* No selection */
            -webkit-user-select: none;
            font-family: 'Inter', sans-serif; 
            background: #0f172a;
            margin: 0; padding: 0; color: #f8fafc; 
            min-height: 100vh;
        }

        .top-nav {
            background: var(--pro-black); padding: 10px 25px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #1e293b;
        }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; color: #fff; }
        .logo span { color: var(--pro-red); }

        .toolbar {
            display: flex; flex-wrap: wrap; gap: 10px; padding: 15px 20px;
            align-items: center; background: #1e293b; margin-bottom: 2px;
        }
        
        .filter-input {
            background: #f8fafc; border: 1px solid #cbd5e1;
            padding: 6px 10px; border-radius: 4px; color: #1e293b;
            font-family: 'JetBrains Mono'; font-weight: bold; font-size: 0.8rem;
        }

        .btn { 
            padding: 8px 15px; border-radius: 4px; font-weight: 800; 
            cursor: pointer; border: none; font-size: 0.7rem; 
            display: flex; align-items: center; gap: 8px; transition: 0.3s;
            text-decoration: none; font-family: 'Orbitron';
        }
        .btn-pdf { background: var(--pro-red); color: white; text-transform: uppercase; }
        .btn-add { background: var(--pro-black); color: #fff; border: 1px solid #334155; margin-left: auto; }
        .btn-dash { background: #fff; color: #000; }

        .report-box { 
            background: var(--surface); padding: 20px; border-radius: 8px; 
            max-width: 96%; margin: 15px auto; color: #1e293b;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .header-main {
            display: flex; justify-content: space-between; align-items: flex-start;
            border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 15px;
        }

        .office-tag { text-align: right; }
        .office-tag h2 { margin: 0; color: var(--pro-red); font-size: 1rem; font-weight: 900; }
        .office-tag p { margin: 0; font-size: 0.7rem; color: #64748b; font-weight: bold; }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-card {
            padding: 15px; border: 1px solid #e2e8f0; border-radius: 8px;
            text-align: center; background: #fff;
        }
        .stat-card label { display: block; font-size: 0.6rem; font-weight: 900; color: #64748b; margin-bottom: 3px; }
        .stat-card span { font-size: 1.2rem; font-weight: 800; }

        /* --- COMPACT TABLE --- */
        table { width: 100%; border-collapse: collapse; }
        th { 
            background: #0f172a; color: white; padding: 10px; 
            text-align: left; font-size: 0.65rem; font-family: 'Orbitron';
        }
        td { padding: 8px 10px; border-bottom: 1px solid #f1f5f9; font-weight: 600; font-size: 0.8rem; }

        .action-btn { 
            background: #f1f5f9; border: 1px solid #e2e8f0; padding: 4px; 
            border-radius: 4px; cursor: pointer; color: #64748b; margin: 0 1px;
        }

        #editModal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px); z-index: 1000; align-items: center; justify-content: center;
        }
        .modal-card {
            background: #0f172a; border: 2px solid var(--accent-cyan);
            padding: 25px; border-radius: 12px; width: 90%; max-width: 450px;
            box-shadow: 0 0 30px rgba(34, 211, 238, 0.2);
        }
        .modal-card h2 { font-family: 'Orbitron'; color: white; margin: 0 0 20px 0; font-size: 1.1rem; }
        .modal-card label { color: var(--accent-cyan); font-size: 0.7rem; font-weight: bold; margin-bottom: 5px; display: block;}
        .modal-card input {
            width: 100%; padding: 10px; margin-bottom: 15px; box-sizing: border-box;
            background: #1e293b; border: 1px solid #334155; color: white; border-radius: 6px;
        }

        @media print { .toolbar, .top-nav, .no-print { display: none !important; } }
    </style>
</head>
<body oncontextmenu="return false;"> <div class="top-nav">
    <div class="logo"><span>ACCOUNT</span>PRO</div>
    <div style="color: #64748b; font-family: 'JetBrains Mono'; font-size: 0.7rem;">[ MASTER_LEDGER_V2.2 ]</div>
</div>

<div class="toolbar">
    <a href="index.html" class="btn btn-dash">← DASHBOARD</a>
    <input type="date" class="filter-input" id="filter-start">
    <input type="date" class="filter-input" id="filter-end">
    <button class="btn btn-pdf" onclick="downloadPDF()">
        <span class="material-symbols-outlined">picture_as_pdf</span> PDF
    </button>
    <a id="add-entry-link" href="#" class="btn btn-add">+ NEW</a>
</div>

<div class="report-box" id="print-area">
    <div class="header-main">
        <div>
            <p style="margin: 0; font-size: 0.6rem; color: var(--pro-red); font-weight: 900;">ACCOUNT TITLE</p>
            <h1 id="ledger-name-display" style="font-family: 'Orbitron'; margin: 0; font-size: 1.5rem; letter-spacing: -0.5px;">SYSTEM</h1>
        </div>
        <div class="office-tag">
            <h2>OFFICE RECORD SYSTEM</h2>
            <p id="print-date">Date: --/--/----</p>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <label>CREDIT (IN)</label>
            <span style="color: var(--success)" id="sum-cr">0</span>
        </div>
        <div class="stat-card">
            <label>DEBIT (OUT)</label>
            <span style="color: var(--danger)" id="sum-dr">0</span>
        </div>
        <div class="stat-card" style="border: 2px solid var(--pro-red);">
            <label>BALANCE</label>
            <span id="sum-bal">0</span>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>DATE</th>
                <th>DESCRIPTION</th>
                <th style="text-align: right;">CREDIT</th>
                <th style="text-align: right;">DEBIT</th>
                <th style="text-align: right;">BALANCE</th>
                <th class="no-print" style="text-align: center;">ACT</th>
            </tr>
        </thead>
        <tbody id="table-body"></tbody>
    </table>
</div>

<div id="editModal">
    <div class="modal-card">
        <h2>EDIT RECORD CARD</h2>
        <label>DATE</label>
        <input type="date" id="editDate">
        <label>DESCRIPTION</label>
        <input type="text" id="editDesc">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div>
                <label style="color: var(--success);">CREDIT (IN)</label>
                <input type="number" id="editCredit" placeholder="0" oninput="if(this.value) document.getElementById('editDebit').value=''">
            </div>
            <div>
                <label style="color: var(--danger);">DEBIT (OUT)</label>
                <input type="number" id="editDebit" placeholder="0" oninput="if(this.value) document.getElementById('editCredit').value=''">
            </div>
        </div>
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button class="btn" style="background: var(--accent-cyan); color:black; flex:1; justify-content: center;" onclick="saveEntry()">SAVE</button>
            <button class="btn" style="background: #334155; color:white; flex:1; justify-content: center;" onclick="closeModal()">CANCEL</button>
        </div>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const ledgerName = urlParams.get('ledger') || 'SYSTEM';
    const storageKey = `local_data_${ledgerName}`;
    let currentEditIndex = null;

    document.getElementById('ledger-name-display').innerText = ledgerName.toUpperCase();
    document.getElementById('add-entry-link').href = `alldataentry.html?ledger=${ledgerName}`;
    document.getElementById('print-date').innerText = `Report Date: ${new Date().toLocaleDateString()}`;

    // Shortcut Protection: F12, Ctrl+Shift+I, Ctrl+U
    document.onkeydown = function(e) {
        if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73) || (e.ctrlKey && e.keyCode == 85)) {
            return false;
        }
    };

    function renderTable() {
        let entries = JSON.parse(localStorage.getItem(storageKey)) || [];
        const tbody = document.getElementById('table-body');
        let currentBalance = 0, totalCr = 0, totalDr = 0;

        tbody.innerHTML = '';
        entries.forEach((e, index) => {
            let amt = parseFloat(e.amount) || 0;
            if(e.type === 'credit') { currentBalance += amt; totalCr += amt; } 
            else { currentBalance -= amt; totalDr += amt; }

            tbody.innerHTML += `
                <tr>
                    <td style="font-family: 'JetBrains Mono'; font-size:0.75rem;">${e.date}</td>
                    <td style="font-size:0.75rem;">${e.desc}</td>
                    <td style="text-align: right; color: var(--success)">${e.type === 'credit' ? amt.toLocaleString() : '-'}</td>
                    <td style="text-align: right; color: var(--danger)">${e.type === 'debit' ? amt.toLocaleString() : '-'}</td>
                    <td style="text-align: right; font-weight: 800;">${currentBalance.toLocaleString()}</td>
                    <td class="no-print" style="text-align: center;">
                        <button class="action-btn" onclick="openEdit(${index})">
                            <span class="material-symbols-outlined" style="font-size:14px">edit</span>
                        </button>
                        <button class="action-btn" onclick="deleteRow(${index})">
                            <span class="material-symbols-outlined" style="font-size:14px">delete</span>
                        </button>
                    </td>
                </tr>`;
        });

        document.getElementById('sum-cr').innerText = `${totalCr.toLocaleString()}`;
        document.getElementById('sum-dr').innerText = `${totalDr.toLocaleString()}`;
        document.getElementById('sum-bal').innerText = `${currentBalance.toLocaleString()}`;
    }

    function openEdit(index) {
        let entries = JSON.parse(localStorage.getItem(storageKey));
        let item = entries[index];
        currentEditIndex = index;
        document.getElementById('editDate').value = item.date;
        document.getElementById('editDesc').value = item.desc;
        document.getElementById('editCredit').value = item.type === 'credit' ? item.amount : '';
        document.getElementById('editDebit').value = item.type === 'debit' ? item.amount : '';
        document.getElementById('editModal').style.display = 'flex';
    }

    function saveEntry() {
        let entries = JSON.parse(localStorage.getItem(storageKey));
        let crVal = document.getElementById('editCredit').value;
        let drVal = document.getElementById('editDebit').value;
        let finalType = entries[currentEditIndex].type;
        let finalAmount = 0;

        if (crVal !== '' && parseFloat(crVal) > 0) {
            finalType = 'credit'; finalAmount = parseFloat(crVal);
        } else if (drVal !== '' && parseFloat(drVal) > 0) {
            finalType = 'debit'; finalAmount = parseFloat(drVal);
        } else {
            alert("Amount likho!"); return;
        }

        entries[currentEditIndex] = {
            date: document.getElementById('editDate').value,
            desc: document.getElementById('editDesc').value,
            type: finalType, amount: finalAmount
        };
        localStorage.setItem(storageKey, JSON.stringify(entries));
        closeModal(); renderTable();
    }

    function closeModal() { document.getElementById('editModal').style.display = 'none'; }

    function deleteRow(index) {
        if(confirm("Delete?")) {
            let entries = JSON.parse(localStorage.getItem(storageKey));
            entries.splice(index, 1);
            localStorage.setItem(storageKey, JSON.stringify(entries));
            renderTable();
        }
    }

    function downloadPDF() {
        const element = document.getElementById('print-area');
        const opt = {
            margin: 0.3,
            filename: `${ledgerName}_Report.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    }

    window.onload = renderTable;
</script>
</body>
</html>
