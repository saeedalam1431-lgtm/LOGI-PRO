<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AccountPro - Smart Entry</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #fbbf24;
            --bg-dark: #020617;
            --card-bg: rgba(15, 23, 42, 0.9);
            --input-bg: #1e293b;
            --text-gray: #94a3b8;
            --success: #4ade80;
            --danger: #f87171;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(rgba(2, 6, 23, 0.8), rgba(2, 6, 23, 0.8)), 
                        url('imgback/logo.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #f8fafc; 
            margin: 0; padding: 0; 
            /* Copy Protection */
            user-select: none;
            -webkit-user-select: none;
        }

        .top-banner { 
            background: var(--primary); 
            color: #020617; 
            padding: 8px 0; 
            text-align: center; 
            font-size: 0.75rem; 
            font-weight: 900; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
        }

        nav { 
            background: var(--card-bg); 
            padding: 15px 25px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid #1e293b; 
            backdrop-filter: blur(10px);
        }
        
        .nav-brand { font-family: 'Orbitron', sans-serif; font-weight: 800; font-size: 1.4rem; color: var(--primary); text-transform: uppercase; }

        .btn-nav { 
            padding: 10px 18px; 
            text-decoration: none; 
            border-radius: 6px; 
            font-weight: 800; 
            font-size: 0.75rem; 
            font-family: 'Orbitron';
            transition: 0.3s; 
            display: inline-block;
        }
        .btn-dash { background: transparent; color: var(--text-gray); border: 1px solid #334155; margin-right: 8px; }
        .btn-view { background: #1e3a8a; color: white; border: none; }

        .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }

        .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; }
        .stat-card { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 12px; 
            text-align: center; 
            border: 1px solid #1e293b;
            border-top: 4px solid var(--primary);
            backdrop-filter: blur(10px);
        }
        .stat-card h3 { font-size: 0.65rem; margin: 0; color: var(--text-gray); text-transform: uppercase; }
        .stat-card p { margin: 10px 0 0; font-size: 1.4rem; font-weight: 800; font-family: 'Orbitron'; }

        .entry-card { 
            background: var(--card-bg); 
            padding: 35px; 
            border-radius: 20px; 
            border: 1px solid #1e293b; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            backdrop-filter: blur(15px);
        }
        .form-title { 
            margin-bottom: 25px; 
            color: var(--primary); 
            font-size: 1.2rem; 
            text-transform: uppercase; 
            font-family: 'Orbitron';
            border-bottom: 1px solid #334155;
            padding-bottom: 10px;
        }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        @media (max-width: 600px) { .input-grid { grid-template-columns: 1fr; } }

        .field { margin-bottom: 20px; position: relative; }
        label { display: block; margin-bottom: 10px; font-weight: 700; font-size: 0.75rem; color: var(--text-gray); text-transform: uppercase; }
        
        input, select { 
            width: 100%; 
            padding: 14px; 
            background: var(--input-bg); 
            border: 2px solid #334155; 
            border-radius: 8px; 
            font-size: 1rem; 
            color: white; 
            outline: none; 
            box-sizing: border-box;
            transition: 0.3s; 
            font-family: 'Inter', sans-serif;
        }
        input:focus { border-color: var(--primary); }
        
        select#type.type-credit { border-color: var(--success); }
        select#type.type-debit { border-color: var(--danger); }

        /* Custom Suggestion Box for Banks & Description */
        .suggestion-box { 
            position: absolute; background: #1e293b; border: 1px solid var(--primary); 
            border-radius: 8px; width: 100%; max-height: 150px; overflow-y: auto; 
            z-index: 1000; display: none; margin-top: 5px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .suggestion-item { padding: 12px; cursor: pointer; border-bottom: 1px solid #334155; font-size: 0.9rem; transition: background 0.2s; }
        .suggestion-item.active { background: var(--primary); color: #000; }
        .suggestion-item:hover { background: var(--primary); color: #000; }

        .btn-save { 
            width: 100%; background: var(--primary); color: #020617; border: none; 
            padding: 18px; border-radius: 12px; font-weight: 900; cursor: pointer; 
            margin-top: 10px; text-transform: uppercase; font-family: 'Orbitron';
        }
        
        #success-msg { 
            color: var(--success); font-weight: 800; margin-top: 20px; 
            display: none; text-align: center; font-size: 0.9rem; 
            background: rgba(74, 222, 128, 0.1); padding: 10px; border-radius: 8px;
        }
    </style>
</head>
<body oncontextmenu="return false;" onkeydown="return disableInspection(event)">

<div class="top-banner">LOCAL STORAGE SYSTEM • ACCURATE RECORDING ACTIVE</div>

<nav>
    <div class="nav-brand" id="dynamic-brand">LOADING...</div>
    <div class="nav-btns">
        <a href="index.html" class="btn-nav btn-dash">DASHBOARD</a>
        <a id="back-to-statement" href="#" class="btn-nav btn-view">VIEW STATEMENT</a>
    </div>
</nav>

<div class="container">
    <div class="stats-bar">
        <div class="stat-card"><h3>Net Balance</h3><p id="live-bal">0</p></div>
        <div class="stat-card" style="border-top-color: var(--success);"><h3 style="color:var(--success)">Total Credit</h3><p style="color: var(--success);" id="live-cr">0</p></div>
        <div class="stat-card" style="border-top-color: var(--danger);"><h3 style="color:var(--danger)">Total Debit</h3><p style="color: var(--danger);" id="live-dr">0</p></div>
    </div>

    <div class="entry-card">
        <div class="form-title">New Transaction</div>
        
        <div class="input-grid">
            <div class="field">
                <label>Date</label>
                <input type="date" id="date">
            </div>
            <div class="field">
                <label>Transaction Type</label>
                <select id="type" class="type-debit" onchange="this.className='type-'+this.value">
                    <option value="debit">Cash Out (Debit -)</option>
                    <option value="credit">Cash In (Credit +)</option>
                </select>
            </div>
        </div>

        <div class="field">
            <label>Description / Details</label>
            <input type="text" id="desc" placeholder="Details..." autocomplete="off">
            <div id="desc-box" class="suggestion-box"></div>
        </div>

        <div class="input-grid">
            <div class="field">
                <label>Payment Mode / Bank Name</label>
                <input type="text" id="bank" placeholder="Type bank name..." autocomplete="off">
                <div id="bank-box" class="suggestion-box"></div>
            </div>

            <div class="field">
                <label>Amount (PKR)</label>
                <input type="number" id="amount" placeholder="0.00">
            </div>
        </div>

        <button class="btn-save" id="save-btn">SAVE TRANSACTION</button>
        <p id="success-msg">✔ RECORDED SUCCESSFULLY</p>
    </div>
</div>

<script>
    // COPY PROTECTION LOGIC
    function disableInspection(e) {
        if (e.ctrlKey && (e.keyCode === 67 || e.keyCode === 85 || e.keyCode === 73 || e.keyCode === 74)) {
            return false;
        }
    }

    const urlParams = new URLSearchParams(window.location.search);
    const ledgerName = urlParams.get('ledger') || 'GUEST';
    const storageKey = `local_data_${ledgerName}`;

    document.getElementById('dynamic-brand').innerText = ledgerName.toUpperCase();
    document.getElementById('back-to-statement').href = `datastatement.html?ledger=${ledgerName}`;
    document.getElementById('date').valueAsDate = new Date();

    const pakBanks = ["CASH", "CHECK", "PAY ORDER", "MEEZAN BANK", "HABIB BANK LIMITED (HBL)", "UNITED BANK LIMITED (UBL)", "MCB BANK", "ALLIED BANK (ABL)", "BANK ALFALAH", "STANDARD CHARTERED", "ASKARI BANK", "BANK AL HABIB", "FAYSAL BANK", "DUBAI ISLAMIC BANK", "AL BARAKA BANK", "JS BANK", "SONERI BANK", "SINDH BANK", "BANK OF PUNJAB", "EASYPAISA", "JAZZCASH", "SADAPAY", "NAYAPAY"];

    window.onload = updateLiveStats;

    function updateLiveStats() {
        const entries = JSON.parse(localStorage.getItem(storageKey)) || [];
        let netBal = 0, tCr = 0, tDr = 0;
        entries.forEach(e => {
            const val = parseFloat(e.amount) || 0;
            if (e.type === 'credit') { tCr += val; netBal += val; } 
            else if (e.type === 'debit') { tDr += val; netBal -= val; }
        });
        document.getElementById('live-bal').innerText = netBal.toLocaleString();
        document.getElementById('live-cr').innerText = tCr.toLocaleString();
        document.getElementById('live-dr').innerText = tDr.toLocaleString();
    }

    // UPDATED Keyboard Friendly Suggestion Handler
    function handleSuggestions(inputId, boxId, list) {
        const input = document.getElementById(inputId);
        const box = document.getElementById(boxId);
        let currentFocus = -1;

        input.addEventListener('input', () => {
            const val = input.value.toUpperCase();
            box.innerHTML = '';
            currentFocus = -1;

            if (!val) { box.style.display = 'none'; return; }
            
            const matches = list.filter(item => item.toUpperCase().includes(val));
            if (matches.length > 0) {
                matches.forEach((m) => {
                    const itemDiv = document.createElement("div");
                    itemDiv.className = "suggestion-item";
                    itemDiv.innerText = m;
                    itemDiv.onclick = () => {
                        input.value = m;
                        box.style.display = 'none';
                    };
                    box.appendChild(itemDiv);
                });
                box.style.display = 'block';
            } else { box.style.display = 'none'; }
        });

        // Keyboard navigation
        input.addEventListener('keydown', (e) => {
            const items = box.getElementsByClassName("suggestion-item");
            if (box.style.display === 'none') return;

            if (e.keyCode === 40) { // Down
                currentFocus++;
                setActive(items);
            } else if (e.keyCode === 38) { // Up
                currentFocus--;
                setActive(items);
            } else if (e.keyCode === 13) { // Enter
                if (currentFocus > -1) {
                    e.preventDefault();
                    if (items[currentFocus]) items[currentFocus].click();
                }
            }
        });

        function setActive(items) {
            if (!items) return;
            removeActive(items);
            if (currentFocus >= items.length) currentFocus = 0;
            if (currentFocus < 0) currentFocus = items.length - 1;
            items[currentFocus].classList.add("active");
            items[currentFocus].scrollIntoView({ block: "nearest" });
        }

        function removeActive(items) {
            for (let i = 0; i < items.length; i++) {
                items[i].classList.remove("active");
            }
        }

        document.addEventListener('click', (e) => {
            if (e.target !== input) box.style.display = 'none';
        });
    }

    // Initialize Suggestions
    const storedEntries = JSON.parse(localStorage.getItem(storageKey)) || [];
    const uniqueDescs = [...new Set(storedEntries.map(e => e.desc))];
    handleSuggestions('desc', 'desc-box', uniqueDescs);
    handleSuggestions('bank', 'bank-box', pakBanks);

    // Save Data
    document.getElementById('save-btn').onclick = function() {
        const date = document.getElementById('date').value;
        const desc = document.getElementById('desc').value.trim();
        const bank = document.getElementById('bank').value.trim();
        const type = document.getElementById('type').value;
        const amount = document.getElementById('amount').value;

        if(!date || !desc || !amount || amount <= 0) {
            alert("Please enter all details!");
            return;
        }

        const entry = { date, desc, bank: bank || 'N/A', type, amount: parseFloat(amount), id: Date.now() };
        let entriesList = JSON.parse(localStorage.getItem(storageKey)) || [];
        entriesList.push(entry);
        localStorage.setItem(storageKey, JSON.stringify(entriesList));

        document.getElementById('success-msg').style.display = 'block';
        document.getElementById('desc').value = '';
        document.getElementById('bank').value = '';
        document.getElementById('amount').value = '';
        updateLiveStats();
        setTimeout(() => { document.getElementById('success-msg').style.display = 'none'; }, 2000);
    };
</script>
</body>
</html>
